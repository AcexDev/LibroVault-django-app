{% extends 'library/base.html' %}
{% load static %}
{% block content %}

<div style="
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
  text-align: center;
">

  <!-- Book icon -->
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
       stroke="var(--accent)" stroke-width="1.5"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13
             C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13
             C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13
             C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
  </svg>

  <h3 style="font-family:'Gloock',serif; font-weight:400; color:var(--text-primary);">
    Coming Soon
  </h3>

  <p style="color:var(--text-secondary); font-family:'IBM Plex Serif',serif; font-style:italic;">
    This feature is on its way.
  </p>

  <a href="/" style="
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
  ">← Back to Home</a>

</div>

{% endblock content %}
