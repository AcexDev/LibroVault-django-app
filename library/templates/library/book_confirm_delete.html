{% extends 'library/base.html' %} {% load crispy_forms_tags %} 
{% block content%}
<div class="content-section">
  <form method="POST">
    {% csrf_token %}
    <fieldset class="form-group">
      <legend class="border-bottom mb-4">Delete Book "{{ object.book.title }}"</legend>
      {{ form|crispy }}
    </fieldset>
    <div class="form-group">
      <button class="btn btn-outline-danger mr-2" type="submit">Delete</button>
      <a class="btn btn-outline-secondary" type="submit" href="{% url 'book-detail' object.book.id %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock content %}
