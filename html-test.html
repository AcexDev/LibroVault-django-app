<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 380px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
            font-weight: 500;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #4a4a4a;
            background: #222;
        }

        input::placeholder {
            color: #555;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #fff;
        }

        .checkbox-wrapper label {
            margin: 0;
            cursor: pointer;
            color: #aaa;
        }

        .forgot {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot:hover {
            color: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .divider {
            margin: 32px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #2a2a2a;
        }

        .divider span {
            position: relative;
            background: #0a0a0a;
            padding: 0 16px;
            color: #666;
            font-size: 13px;
        }

        .signup {
            text-align: center;
            color: #888;
            font-size: 14px;
        }

        .signup a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .signup a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome back</h1>
        <p class="subtitle">Enter your credentials to continue</p>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="name@company.com" autocomplete="email">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>

        <div class="options">
            <div class="checkbox-wrapper">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button onclick="handleLogin()">Sign in</button>

        <div class="divider">
            <span>or</span>
        </div>

        <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
    </div>

    <script>
        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            if (!email.includes('@')) {
                alert('Please enter a valid email address');
                return;
            }
            
            console.log('Login attempt:', { email, password, remember });
            alert('Login submitted! Check console for details.');
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
